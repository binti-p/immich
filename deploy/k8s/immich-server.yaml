apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: aesthetic-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      initContainers:
        - name: init-immich-storage
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/upload /data/thumbs /data/profile /data/backups /data/library /data/encoded-video
              touch /data/upload/.immich /data/thumbs/.immich /data/profile/.immich /data/backups/.immich /data/library/.immich /data/encoded-video/.immich
          volumeMounts:
            - name: immich-upload-storage
              mountPath: /data
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          env:
            - name: AESTHETIC_SERVICE_URL
              value: "http://aesthetic-service:8002"
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              value: immich
            - name: DB_DATABASE_NAME
              value: immich
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: UPLOAD_LOCATION
              value: /data
            - name: IMMICH_HOST
              value: "0.0.0.0"
          ports:
            - containerPort: 2283
          volumeMounts:
            - name: immich-upload-storage
              mountPath: /data
      volumes:
        - name: immich-upload-storage
          persistentVolumeClaim:
            claimName: immich-upload-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: aesthetic-hub
spec:
  selector:
    app: immich-server
  ports:
    - port: 2283
      targetPort: 2283
      nodePort: 32081
  type: NodePort
