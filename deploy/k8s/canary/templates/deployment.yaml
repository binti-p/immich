apiVersion: apps/v1
kind: Deployment
metadata:
  name: aesthetic-scoring-canary
  namespace: aesthetic-hub-canary
  labels:
    app: aesthetic-scoring
    track: canary
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aesthetic-scoring
      track: canary
  template:
    metadata:
      labels:
        app: aesthetic-scoring
        track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.scoringService.port }}"
    spec:
      containers:
        - name: scoring-service
          image: "{{ .Values.scoringService.image.repository }}:{{ .Values.scoringService.image.tag }}"
          imagePullPolicy: {{ .Values.scoringService.image.pullPolicy }}
          env:
            - name: MODEL_URI
              value: "{{ .Values.scoringService.modelUri }}"
            - name: MLFLOW_TRACKING_URI
              value: "{{ .Values.scoringService.mlflowTrackingUri }}"
            - name: TRITON_HOST
              value: "triton-canary"
            - name: TRITON_PORT
              value: "{{ .Values.triton.port }}"
            - name: ENVIRONMENT
              value: canary
            - name: MODEL_VERSION
              value: "v1"
            - name: POSTGRES_HOST
              value: "data-pipeline-postgres.aesthetic-hub.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "aesthetic_hub"
            - name: POSTGRES_USER
              value: "postgres"
              # valueFrom:
              #   secretKeyRef:
              #     name: immich-postgres-secret
              #     key: username
            - name: POSTGRES_PASSWORD
              value: "postgres123"
              # valueFrom:
              #   secretKeyRef:
              #     name: immich-postgres-secret
              #     key: password
          ports:
            - containerPort: {{ .Values.scoringService.port }}
              name: http
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.scoringService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.scoringService.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
{{- if .Values.triton.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-canary
  namespace: aesthetic-hub-canary
  labels:
    app: triton
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton
      track: canary
  template:
    metadata:
      labels:
        app: triton
        track: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.triton.metricsPort }}"
    spec:
      containers:
        - name: triton
          image: "{{ .Values.triton.image.repository }}:{{ .Values.triton.image.tag }}"
          args:
            - tritonserver
            - --model-repository={{ .Values.triton.modelRepository }}
            - --model-control-mode=poll
            - --repository-poll-secs=30
            - --allow-metrics=true
            - --metrics-port={{ .Values.triton.metricsPort }}
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: TRITON_AWS_ENDPOINT
              value: "http://minio.platform.svc.cluster.local:9000"
            - name: AWS_ENDPOINT_URL
              value: "http://minio.platform.svc.cluster.local:9000"
          ports:
            - containerPort: {{ .Values.triton.port }}
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: {{ .Values.triton.metricsPort }}
              name: metrics
          resources:
            requests:
              cpu: {{ .Values.triton.resources.requests.cpu }}
              memory: {{ .Values.triton.resources.requests.memory }}
            limits:
              cpu: {{ .Values.triton.resources.limits.cpu }}
              memory: {{ .Values.triton.resources.limits.memory }}
{{- end }}
