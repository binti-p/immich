# Canary environment: receives a small fraction of real traffic to validate
# a new model version before full promotion to production.
# Traffic split is enforced at the Immich proxy/ingress level by the serving team.

replicaCount: 1

scoringService:
  image:
    repository: somaditya24/aesthetic-scoring-service
    tag: v3
    pullPolicy: IfNotPresent
  port: 8000
  # Model URI injected by the promote-model Argo Workflow
  modelUri: "models:/aesthetic-scorer/canary"
  mlflowTrackingUri: "http://mlflow.platform.svc.cluster.local:5000"

triton:
  enabled: true
  image:
    repository: nvcr.io/nvidia/tritonserver
    tag: "24.10-py3"
  port: 8000
  metricsPort: 8002
  modelRepository: "s3://triton-models/canary"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

service:
  type: ClusterIP
  externalIP: ""

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Traffic weight for canary (10% of scoring requests go here).
# Managed via Immich's nginx config / ingress annotations.
canary:
  weight: 10

# Promotion gates: serving team monitors these and triggers the
# promote-model workflow when all gates pass.
promotionGates:
  minAccuracy: 0.80
  maxErrorRate: 0.02
  minRequestCount: 100
  observationWindowMinutes: 30
