apiVersion: apps/v1
kind: Deployment
metadata:
  name: aesthetic-service-staging
  namespace: aesthetic-hub-staging
  labels:
    app: aesthetic-service
    track: staging
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aesthetic-service
      track: staging
  template:
    metadata:
      labels:
        app: aesthetic-service
        track: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.aestheticService.port }}"
    spec:
      containers:
        - name: aesthetic-service
          image: "{{ .Values.aestheticService.image.repository }}:{{ .Values.aestheticService.image.tag }}"
          imagePullPolicy: {{ .Values.aestheticService.image.pullPolicy }}
          env:
            - name: POSTGRES_HOST
              value: "{{ .Values.postgres.host }}"
            - name: POSTGRES_PORT
              value: "{{ .Values.postgres.port }}"
            - name: POSTGRES_DB
              value: "{{ .Values.postgres.database }}"
            - name: POSTGRES_USER
              value: "{{ .Values.postgres.user }}"
            - name: POSTGRES_PASSWORD
              value: "immich"
            - name: AWS_ENDPOINT_URL
              value: "{{ .Values.minio.endpointUrl }}"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: MINIO_BUCKET
              value: "{{ .Values.minio.bucket }}"
            - name: MODEL_STAGE
              value: "{{ .Values.minio.modelStage }}"
            - name: IMMICH_SERVER_URL
              value: "{{ .Values.immichServer.url }}"
            - name: USE_TRITON
              value: "{{ .Values.triton.useTriton }}"
            - name: TRITON_HOST
              value: "triton-staging"
            - name: TRITON_PORT
              value: "{{ .Values.triton.port }}"
          ports:
            - containerPort: {{ .Values.aestheticService.port }}
              name: http
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.aestheticService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
{{- if .Values.triton.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-staging
  namespace: aesthetic-hub-staging
  labels:
    app: triton
    track: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton
      track: staging
  template:
    metadata:
      labels:
        app: triton
        track: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.triton.metricsPort }}"
    spec:
      containers:
        - name: triton
          image: "{{ .Values.triton.image.repository }}:{{ .Values.triton.image.tag }}"
          args:
            - tritonserver
            - --model-repository={{ .Values.triton.modelRepository }}
            - --model-control-mode=poll
            - --repository-poll-secs=30
            - --allow-metrics=true
            - --metrics-port={{ .Values.triton.metricsPort }}
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: accesskey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secretkey
            - name: TRITON_AWS_ENDPOINT
              value: "{{ .Values.minio.endpointUrl }}"
            - name: AWS_ENDPOINT_URL
              value: "{{ .Values.minio.endpointUrl }}"
          ports:
            - containerPort: {{ .Values.triton.port }}
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: {{ .Values.triton.metricsPort }}
              name: metrics
          resources:
            requests:
              cpu: {{ .Values.triton.resources.requests.cpu }}
              memory: {{ .Values.triton.resources.requests.memory }}
            limits:
              cpu: {{ .Values.triton.resources.limits.cpu }}
              memory: {{ .Values.triton.resources.limits.memory }}
{{- end }}
