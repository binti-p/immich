apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Aesthetic Hub
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster
  namespace: monitoring
data:
  cluster-overview.json: |
    {
      "title": "Aesthetic Hub - Cluster Overview",
      "uid": "aes-cluster",
      "tags": ["kubernetes", "aesthetic-hub"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Node CPU Usage (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 85}
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Node Memory Usage (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 85}
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Pod Count by Namespace",
          "type": "stat",
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "count by(namespace) (kube_pod_status_ready{condition=\"true\"})",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Node Disk Usage (%)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "(1 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"})) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 80}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Pod Restart Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "sum by(pod, namespace) (increase(kube_pod_container_status_restarts_total[10m]))",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "HPA Replica Count",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas",
              "legendFormat": "{{horizontalpodautoscaler}} (current)"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas",
              "legendFormat": "{{horizontalpodautoscaler}} (max)"
            }
          ]
        },
        {
          "id": 7,
          "title": "Active Alerts",
          "type": "alertlist",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "options": {
            "alertName": "",
            "dashboardAlerts": false,
            "maxItems": 20,
            "sortOrder": 1,
            "stateFilter": {"firing": true, "pending": true}
          }
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aesthetic
  namespace: monitoring
data:
  aesthetic-scoring.json: |
    {
      "title": "Aesthetic Hub - Scoring Pipeline",
      "uid": "aes-scoring",
      "tags": ["aesthetic-hub", "ml"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Score Distribution (cumulative)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "rate(aesthetic_score_bucket[5m])",
              "legendFormat": "le={{le}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 2,
          "title": "Median Score Over Time",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(aesthetic_score_bucket[5m]))",
              "legendFormat": "p50"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short", "min": 0, "max": 1}}
        },
        {
          "id": 3,
          "title": "Cold Start Rate",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "rate(cold_start_total[5m]) / rate(score_image_request_duration_seconds_count[5m])",
              "legendFormat": "cold start rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.5},
                  {"color": "red", "value": 0.8}
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Low Confidence Rate",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "targets": [
            {
              "expr": "rate(low_confidence_total[5m]) / rate(score_image_request_duration_seconds_count[5m])",
              "legendFormat": "low confidence rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.2},
                  {"color": "red", "value": 0.4}
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "Active Model Version",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "aesthetic_active_model_version_timestamp",
              "legendFormat": "model version"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "dateTimeAsIso"}}
        },
        {
          "id": 6,
          "title": "MinIO Flush Errors",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
          "targets": [
            {
              "expr": "rate(minio_flush_errors_total[5m])",
              "legendFormat": "flush errors/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 0.01}
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "title": "Event Ingestion by Type",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "rate(interaction_events_total[5m])",
              "legendFormat": "{{event_type}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 8,
          "title": "Score-Image Latency p50/p95",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(score_image_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(score_image_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        }
      ]
    }
