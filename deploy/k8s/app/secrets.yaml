kind: Secret
metadata:
  name: immich-postgres-secret
  namespace: aesthetic-hub
type: Opaque
data:
  # Password: immich (base64 encoded)
  # To generate: echo -n 'immich' | base64
  password: aW1taWNo
---
# Secret for Data Pipeline PostgreSQL
# Contains passwords for both 'aesthetic' user and 'immich_readonly' user
apiVersion: v1
kind: Secret
metadata:
  name: data-pipeline-postgres-secret
  namespace: aesthetic-hub
type: Opaque
data:
  # Password for 'aesthetic' user (main data pipeline user)
  # Password: aesthetic_secure_2024 (base64 encoded)
  # To generate: echo -n 'aesthetic_secure_2024' | base64
  password: YWVzdGhldGljX3NlY3VyZV8yMDI0
  
  # Password for 'immich_readonly' user (read-only access for Immich Server)
  # This user will be created in Task 16.1
  # Password: immich_readonly_2024 (base64 encoded)
  # To generate: echo -n 'immich_readonly_2024' | base64
  immich_readonly_password: aW1taWNoX3JlYWRvbmx5XzIwMjQ=
