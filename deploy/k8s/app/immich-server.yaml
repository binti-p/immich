apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: aesthetic-hub
  labels:
    app: immich-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      initContainers:
        - name: init-immich-storage
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/upload /data/thumbs /data/profile /data/backups /data/library /data/encoded-video
              touch /data/upload/.immich /data/thumbs/.immich /data/profile/.immich /data/backups/.immich /data/library/.immich /data/encoded-video/.immich
          volumeMounts:
            - name: immich-upload-storage
              mountPath: /data
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          env:
            # Immich Database Configuration
            - name: DB_HOSTNAME
              value: immich-postgres
            - name: DB_USERNAME
              value: immich
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-secret
                  key: password
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_PORT
              value: "5432"
            
            # Feature Service Configuration
            - name: FEATURE_SERVICE_URL
              value: http://feature-svc.aesthetic-hub.svc.cluster.local:8001
            - name: ENABLE_AESTHETIC_SCORING
              value: "true"
            
            # Redis Configuration
            - name: REDIS_HOSTNAME
              value: immich-redis
            - name: REDIS_PORT
              value: "6379"
            
            # Storage Configuration
            - name: UPLOAD_LOCATION
              value: /data
            
            # Server Configuration
            - name: IMMICH_HOST
              value: "0.0.0.0"
            - name: IMMICH_PORT
              value: "2283"
            
            # Logging Configuration (Requirements 20.5, 20.6)
            - name: IMMICH_LOG_LEVEL
              value: "log"  # Options: verbose, debug, log, warn, error, fatal (default: log = INFO)
            - name: IMMICH_LOG_FORMAT
              value: "json"  # Options: console, json (default: console)
          
          ports:
            - containerPort: 2283
              name: http
              protocol: TCP
          
          volumeMounts:
            - name: immich-upload-storage
              mountPath: /data
          
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          
          livenessProbe:
            httpGet:
              path: /api/server-info/ping
              port: 2283
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/server-info/ping
              port: 2283
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      
      volumes:
        - name: immich-upload-storage
          persistentVolumeClaim:
            claimName: immich-upload-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: aesthetic-hub
  labels:
    app: immich-server
spec:
  type: NodePort
  selector:
    app: immich-server
  ports:
    - port: 2283
      targetPort: 2283
      nodePort: 32081
      protocol: TCP
      name: http
