apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-web
  namespace: aesthetic-hub
  labels:
    app: immich-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-web
  template:
    metadata:
      labels:
        app: immich-web
    spec:
      containers:
        - name: immich-web
          image: ghcr.io/immich-app/immich-web:release
          env:
            - name: IMMICH_SERVER_URL
              value: http://immich-server.aesthetic-hub.svc.cluster.local:2283
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: immich-web
  namespace: aesthetic-hub
  labels:
    app: immich-web
spec:
  type: NodePort
  selector:
    app: immich-web
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32080
      protocol: TCP
      name: http