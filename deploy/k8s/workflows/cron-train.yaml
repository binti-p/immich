# CronWorkflow: scheduled weekly retraining
# Runs every Sunday at 02:00 UTC.
# Gathers interaction data → trains personalized model → evaluates →
# exports ONNX → quality gate → triggers promotion pipeline.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: cron-aesthetic-train
  namespace: argo
  labels:
    app.kubernetes.io/part-of: aesthetic-hub
spec:
  schedule: '0 2 * * 0'
  timezone: 'UTC'
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  workflowSpec:
    workflowTemplateRef:
      name: train-and-evaluate
    arguments:
      parameters:
        - name: serving-image
          value: 'ghcr.io/binti-p/aesthetic-service:05874a393dbbe73048acc7b13bb69f6527734c4a'
        - name: minio-endpoint
          value: 'http://minio.platform.svc.cluster.local:9000'
        - name: model-name
          value: 'aesthetic-scorer'
        - name: min-spearman-r
          value: '0.70'
        - name: min-ndcg-at-10
          value: '0.65'
