# WorkflowTemplate: promote-serving
# Owned by: serving team
# Triggered manually or by: train-and-evaluate completing successfully
# Steps:
#   1. smoke-test    — hit staging scoring service, verify basic correctness
#   2. promote-to-canary — if smoke test passes, promote staging → canary
#   3. observe-canary — wait 30min, query Prometheus, decide
#   4. promote-to-production OR rollback
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: promote-serving
  namespace: argo
  labels:
    app.kubernetes.io/part-of: aesthetic-hub
spec:
  entrypoint: serving-pipeline
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: model-name
        value: "aesthetic-scorer"
      - name: mlflow-uri
        value: "http://mlflow.platform.svc.cluster.local:5000"
      - name: minio-endpoint
        value: "http://minio.platform.svc.cluster.local:9000"
      - name: prometheus-url
        value: "http://prometheus.monitoring.svc.cluster.local:9090"
      - name: staging-scoring-url
        value: "http://aesthetic-scoring.aesthetic-hub-staging.svc.cluster.local:8000"
      - name: observation-minutes
        value: "30"
      - name: serving-image
        value: "somaditya24/aesthetic-scoring-service:v4"

  templates:
    - name: serving-pipeline
      dag:
        tasks:
          - name: smoke-test-staging
            template: run-smoke-test

          - name: promote-staging-to-canary
            dependencies: [smoke-test-staging]
            template: call-promote-model
            when: "{{tasks.smoke-test-staging.outputs.parameters.smoke-passed}} == true"
            arguments:
              parameters:
                - name: from-stage
                  value: "Staging"
                - name: to-stage
                  value: "Canary"

          - name: observe-canary
            dependencies: [promote-staging-to-canary]
            template: run-canary-monitor

          - name: promote-canary-to-production
            dependencies: [observe-canary]
            template: call-promote-model
            when: "{{tasks.observe-canary.outputs.parameters.canary-decision}} == promote"
            arguments:
              parameters:
                - name: from-stage
                  value: "Canary"
                - name: to-stage
                  value: "Production"
            
          - name: rescore-active-users
            dependencies: [promote-canary-to-production]
            template: run-rescore
            when: "{{tasks.observe-canary.outputs.parameters.canary-decision}} == promote"

          - name: rollback-canary
            dependencies: [observe-canary]
            template: call-promote-model
            when: "{{tasks.observe-canary.outputs.parameters.canary-decision}} == rollback"
            arguments:
              parameters:
                - name: from-stage
                  value: "Canary"
                - name: to-stage
                  value: "Staging"   # demote back

    - name: run-smoke-test
      outputs:
        parameters:
          - name: smoke-passed
            valueFrom:
              path: /tmp/smoke-passed.txt
      container:
        image: "{{workflow.parameters.serving-image}}"
        command: [python, smoke_test.py]
        args:
          - --scoring-url={{workflow.parameters.staging-scoring-url}}
          - --output-result=/tmp/smoke-passed.txt
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

    - name: run-canary-monitor
      outputs:
        parameters:
          - name: canary-decision
            valueFrom:
              path: /tmp/canary-decision.txt
      container:
        image: "{{workflow.parameters.serving-image}}"
        command: [python, canary_monitor.py]
        args:
          - --prometheus-url={{workflow.parameters.prometheus-url}}
          - --observation-minutes={{workflow.parameters.observation-minutes}}
          - --output-decision=/tmp/canary-decision.txt
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

    - name: call-promote-model
      inputs:
        parameters:
          - name: from-stage
          - name: to-stage
      resource:
        action: create
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: promote-model-
            namespace: argo
          spec:
            workflowTemplateRef:
              name: promote-model
            arguments:
              parameters:
                - name: from-stage
                  value: "{{inputs.parameters.from-stage}}"
                - name: to-stage
                  value: "{{inputs.parameters.to-stage}}"
                - name: model-name
                  value: "{{workflow.parameters.model-name}}"
    
    - name: run-rescore
      container:
        image: "somaditya24/aesthetic-scoring-service:v4"
        command: [python, rescore.py]
        args:
          - --scoring-url=http://aesthetic-scoring.aesthetic-hub.svc.cluster.local:8000
          - --active-days=30
        env:
          - name: POSTGRES_HOST
            value: "immich-postgres.aesthetic-hub.svc.cluster.local"
          - name: POSTGRES_DB
            value: "immich"
          - name: POSTGRES_USER
            value: "postgres"
          - name: POSTGRES_PASSWORD
            value: "postgres123"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi