# WorkflowTemplate: train-and-evaluate
# Triggered by: cron (see cron-train.yaml) or manually via Argo UI / argocd webhook.
# Steps:
#   1. train   — runs the batch data/training pipeline from the serving image
#   2. evaluate — checks that the expected trained model artifact exists
#   3. register — records the successful staging candidate for downstream steps
# If evaluate fails, register/export/serving gates are skipped.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: train-and-evaluate
  namespace: argo
  labels:
    app.kubernetes.io/part-of: aesthetic-hub
spec:
  entrypoint: pipeline
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: training-image
        value: 'ghcr.io/binti-p/aesthetic-service:main'
      - name: mlflow-uri
        value: 'http://mlflow.platform.svc.cluster.local:5000'
      - name: minio-endpoint
        value: 'http://minio.platform.svc.cluster.local:9000'
      - name: data-bucket
        value: 'aesthetic-hub-data'
      - name: model-name
        value: 'aesthetic-scorer'
      - name: serving-image
        value: 'ghcr.io/binti-p/aesthetic-service:main'
      # Quality gates (must match values justified in training team's report)
      - name: min-spearman-r
        value: '0.70'
      - name: min-ndcg-at-10
        value: '0.65'

  templates:
    - name: pipeline
      dag:
        tasks:
          - name: train
            template: train-model
          - name: evaluate
            template: evaluate-model
            dependencies: [train]
            arguments:
              parameters:
                - name: run-id
                  value: '{{tasks.train.outputs.parameters.run-id}}'
          - name: register-to-staging
            template: register-model
            dependencies: [evaluate]
            when: '{{tasks.evaluate.outputs.parameters.gates-passed}} == true'
            arguments:
              parameters:
                - name: run-id
                  value: '{{tasks.train.outputs.parameters.run-id}}'
                - name: stage
                  value: 'Staging'
          - name: export-onnx
            template: export-onnx
            dependencies: [register-to-staging]
            when: '{{tasks.evaluate.outputs.parameters.gates-passed}} == true'
            arguments:
              parameters:
                - name: run-id
                  value: '{{tasks.train.outputs.parameters.run-id}}'
          - name: serving-quality-gate
            template: serving-quality-gate
            dependencies: [export-onnx]
            when: '{{tasks.evaluate.outputs.parameters.gates-passed}} == true'
            arguments:
              parameters:
                - name: run-id
                  value: '{{tasks.train.outputs.parameters.run-id}}'

    - name: train-model
      outputs:
        parameters:
          - name: run-id
            valueFrom:
              path: /tmp/run-id.txt
      container:
        image: '{{workflow.parameters.training-image}}'
        command: [sh, -c]
        args:
          - |
            python -m pipelines.batch.pipeline
            TODAY=$(python -c "from datetime import datetime, timezone; print(datetime.now(timezone.utc).strftime('%Y-%m-%d'))")
            python -m pipelines.batch.train_personalized --dataset-version "${TODAY}"
            echo "$TODAY" > /tmp/run-id.txt
        env:
          - name: MLFLOW_TRACKING_URI
            value: '{{workflow.parameters.mlflow-uri}}'
          - name: MLFLOW_S3_ENDPOINT_URL
            value: '{{workflow.parameters.minio-endpoint}}'
          - name: AWS_ENDPOINT_URL
            value: '{{workflow.parameters.minio-endpoint}}'
          - name: MINIO_BUCKET
            value: '{{workflow.parameters.data-bucket}}'
          - name: POSTGRES_HOST
            value: 'immich-postgres.aesthetic-hub.svc.cluster.local'
          - name: POSTGRES_PORT
            value: '5432'
          - name: POSTGRES_DB
            value: 'immich'
          - name: POSTGRES_USER
            value: 'immich'
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich-postgres-secret
                key: password
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: accesskey
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secretkey
        resources:
          requests:
            cpu: '2'
            memory: 4Gi
          limits:
            cpu: '4'
            memory: 8Gi

    - name: evaluate-model
      inputs:
        parameters:
          - name: run-id
      outputs:
        parameters:
          - name: gates-passed
            valueFrom:
              path: /tmp/gates-passed.txt
      container:
        image: '{{workflow.parameters.training-image}}'
        command: [python, -c]
        args:
          - |
            import boto3, os, sys
            from botocore.client import Config

            s3 = boto3.client(
                "s3",
                endpoint_url=os.environ["AWS_ENDPOINT_URL"],
                aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                config=Config(signature_version="s3v4"),
                region_name="us-east-1",
            )

            run_id = "{{inputs.parameters.run-id}}"
            key = f"models/v{run_id}/best_personalized_model.pth"
            try:
                s3.head_object(Bucket=os.environ["MINIO_BUCKET"], Key=key)
            except Exception as exc:
                print(f"Model artifact missing: s3://{os.environ['MINIO_BUCKET']}/{key}: {exc}")
                open("/tmp/gates-passed.txt", "w").write("false")
                sys.exit(1)

            print(f"Model artifact found: s3://{os.environ['MINIO_BUCKET']}/{key}")
            open("/tmp/gates-passed.txt", "w").write("true")
        env:
          - name: MLFLOW_TRACKING_URI
            value: '{{workflow.parameters.mlflow-uri}}'
          - name: MLFLOW_S3_ENDPOINT_URL
            value: '{{workflow.parameters.minio-endpoint}}'
          - name: AWS_ENDPOINT_URL
            value: '{{workflow.parameters.minio-endpoint}}'
          - name: MINIO_BUCKET
            value: '{{workflow.parameters.data-bucket}}'
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: accesskey
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secretkey
        resources:
          requests:
            cpu: '1'
            memory: 2Gi
          limits:
            cpu: '2'
            memory: 4Gi

    - name: register-model
      inputs:
        parameters:
          - name: run-id
          - name: stage
      container:
        image: '{{workflow.parameters.training-image}}'
        command: [sh, -c]
        args:
          - |
            echo "Validated {{workflow.parameters.model-name}} run {{inputs.parameters.run-id}} for {{inputs.parameters.stage}}"
        env:
          - name: MLFLOW_TRACKING_URI
            value: '{{workflow.parameters.mlflow-uri}}'
          - name: MLFLOW_S3_ENDPOINT_URL
            value: '{{workflow.parameters.minio-endpoint}}'
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: accesskey
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secretkey
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

    - name: export-onnx
      inputs:
        parameters:
          - name: run-id
      container:
        image: '{{workflow.parameters.serving-image}}'
        command: [python, -c]
        args:
          - |
            import boto3, os
            from botocore.client import Config

            s3 = boto3.client(
                "s3",
                endpoint_url=os.environ["AWS_ENDPOINT_URL"],
                aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                config=Config(signature_version="s3v4"),
                region_name="us-east-1"
            )

            # Find latest model version in aesthetic-hub-data/models/v*
            data_bucket = "aesthetic-hub-data"
            resp = s3.list_objects_v2(Bucket=data_bucket, Prefix="models/v", Delimiter="/")
            prefixes = [
                cp["Prefix"].rstrip("/").split("/")[-1]
                for cp in resp.get("CommonPrefixes", [])
            ]
            versions = sorted([p for p in prefixes if p.startswith("v")], reverse=True)
            if not versions:
                raise RuntimeError("No model versions found in aesthetic-hub-data/models/")

            latest = versions[0]
            ckpt_key = f"models/{latest}/best_personalized_model.pth"
            ckpt_path = "/tmp/best_personalized_model.pth"

            print(f"Downloading checkpoint: s3://{data_bucket}/{ckpt_key}")
            s3.download_file(data_bucket, ckpt_key, ckpt_path)

            # Run conversion pipeline
            import sys
            sys.path.insert(0, "/app")
            from convert_onnx import convert_ckpt_to_optimized_onnx

            result = convert_ckpt_to_optimized_onnx(
                ckpt_path=ckpt_path,
                output_dir="/tmp/onnx_output"
            )
            print(f"Conversion complete (version: {latest})")

            # Upload optimized ONNX to triton-models staging
            triton_bucket = "triton-models"
            s3.upload_file(
                result["optimized_onnx"],
                triton_bucket,
                "staging/personalized_mlp/1/model.onnx"
            )
            print("Uploaded optimized ONNX to staging/personalized_mlp/1/model.onnx")
        env:
          - name: AWS_ENDPOINT_URL
            value: '{{workflow.parameters.minio-endpoint}}'
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: accesskey
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secretkey
        resources:
          requests:
            cpu: '2'
            memory: 4Gi
          limits:
            cpu: '4'
            memory: 8Gi

    - name: serving-quality-gate
      inputs:
        parameters:
          - name: run-id
      outputs:
        parameters:
          - name: gate-passed
            valueFrom:
              path: /tmp/quality-gate-passed.txt
      container:
        image: '{{workflow.parameters.serving-image}}'
        command: [python, quality_gate.py]
        args:
          - --minio-endpoint={{workflow.parameters.minio-endpoint}}
          - --output-result=/tmp/quality-gate-passed.txt
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: accesskey
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-credentials
                key: secretkey
          - name: POSTGRES_HOST
            value: 'immich-postgres.aesthetic-hub.svc.cluster.local'
          - name: POSTGRES_PORT
            value: '5432'
          - name: POSTGRES_DB
            value: 'immich'
          - name: POSTGRES_USER
            value: 'immich'
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich-postgres-secret
                key: password
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: '2'
            memory: 2Gi
