# Promotion criteria for aesthetic-scorer (personalized model)
# Owned by: serving team
# These thresholds are justified based on Flickr-AES initial implementation results
# (see serving README for benchmark numbers)

quality_gate:
  # Spearman rank correlation on Flickr-AES held-out test set
  # Justified: initial implementation achieved ~0.72 SRCC on personalized model
  # We set floor at 0.65 to allow for slight degradation from retraining on smaller feedback data
  min_spearman_r: 0.65

  # Mean Squared Error on 0-1 scale
  # Justified: acceptable scoring error for ranking purposes
  max_mse: 0.05

  # No NaN or Inf outputs allowed — hard requirement
  allow_nan_outputs: false

  # P95 latency for a batch of 64 on CPU (ms)
  # Justified: MLP is 1.9MB, CPU batch inference should be well under 10ms
  max_p95_latency_ms: 10.0

  # Minimum number of test samples to run gate on
  min_eval_samples: 100

canary:
  # Observation window in minutes before promotion decision
  observation_minutes: 30

  # Max error rate in production during canary window
  max_error_rate: 0.02

  # Max P95 end-to-end scoring latency (ms)
  max_p95_latency_ms: 200.0

  # Max fraction of requests flagged low-confidence
  max_low_confidence_rate: 0.30

  # Minimum requests needed to make a promotion decision
  min_requests: 10

promotion:
  # Alpha blending constant (tau)
  # Justified: after 10 interactions, personalized model gets 50% weight
  tau: 10

  # Low confidence thresholds
  low_confidence_score_threshold: 0.15
  low_confidence_divergence_threshold: 0.40