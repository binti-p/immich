# Docker Compose for Aesthetic Hub using pre-built images from GitHub Container Registry
# 
# This compose file uses the pre-built images instead of building locally.
# Users only need to bring up dependencies (Postgres, Redis, MinIO, MLflow).
#
# Usage:
#   docker compose -f docker-compose.ghcr.yml up
#
# Images are pulled from:
#   ghcr.io/<your-org>/immich-server:latest
#   ghcr.io/<your-org>/immich-machine-learning:latest
#   ghcr.io/<your-org>/aesthetic-service:latest

name: immich-aesthetic

services:
  # ============================================================================
  # Immich Core Services (Pre-built Images)
  # ============================================================================

  immich-server:
    container_name: immich_server
    image: ghcr.io/${GITHUB_ORG:-your-org}/immich-server:${IMAGE_TAG:-latest}
    volumes:
      - ${UPLOAD_LOCATION:-./uploads}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: immich_postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: immich_redis
      REDIS_PORT: 6379
      AESTHETIC_SERVICE_URL: ${AESTHETIC_SERVICE_URL:-http://aesthetic-service:8000}
      ENABLE_AESTHETIC_SCORING: ${ENABLE_AESTHETIC_SCORING:-true}
      IMMICH_LOG_LEVEL: ${IMMICH_LOG_LEVEL:-log}
      IMMICH_LOG_FORMAT: ${IMMICH_LOG_FORMAT:-json}
    ports:
      - '2283:2283'
    depends_on:
      immich_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      aesthetic-service:
        condition: service_started
      immich-machine-learning:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:2283/api/server-info/ping || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/${GITHUB_ORG:-your-org}/immich-machine-learning:${IMAGE_TAG:-latest}
    ports:
      - 3003:3003
    volumes:
      - model-cache:/cache
    restart: unless-stopped
    healthcheck:
      disable: false

  aesthetic-service:
    container_name: aesthetic_service
    image: ghcr.io/${GITHUB_ORG:-your-org}/aesthetic-service:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_HOST: immich_postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: aesthetic-hub-data
      MINIO_TRITON_BUCKET: triton-models
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      IMMICH_SERVER_URL: http://immich_server:2283
      INTERACTION_FLUSH_SIZE: 100
      INFERENCE_FLUSH_SIZE: 50
    ports:
      - '8002:8000'
    depends_on:
      immich_postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      bucket-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================================
  # Dependencies (Users bring these up)
  # ============================================================================

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

  immich_postgres:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION:-./postgres-data}:/var/lib/postgresql/data
    shm_size: 128mb
    ports:
      - '5432:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE_NAME:-immich}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: immich_minio
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bucket-init:
    container_name: immich_bucket_init
    image: python:3.11-slim
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./triton-models:/triton-models:ro
      - ./aesthetic/pipelines:/pipelines:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PYTHONPATH: /pipelines
    command: >
      bash -c "
        pip install --quiet minio pyarrow &&
        python3 -m pipelines.batch.bucket_init
      "
    restart: "no"

  mlflow-postgres:
    container_name: mlflow_postgres
    image: postgres:16
    environment:
      POSTGRES_USER: ${MLFLOW_DB_USER:-mlflow}
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD:-mlflow}
      POSTGRES_DB: ${MLFLOW_DB_NAME:-mlflowdb}
    volumes:
      - mlflow-postgres-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${MLFLOW_DB_USER:-mlflow} -d ${MLFLOW_DB_NAME:-mlflowdb}']
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    container_name: mlflow
    image: ghcr.io/mlflow/mlflow:v3.9.0
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      bucket-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5001
      MLFLOW_LOGGING_LEVEL: ERROR
      MLFLOW_SERVER_ALLOWED_HOSTS: '*'
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '5001:5001'
    command: >
      /bin/sh -c "pip install --no-cache-dir psycopg2-binary boto3 && mlflow server --backend-store-uri postgresql://${MLFLOW_DB_USER:-mlflow}:${MLFLOW_DB_PASSWORD:-mlflow}@mlflow-postgres:5432/${MLFLOW_DB_NAME:-mlflowdb} --artifacts-destination s3://mlflow-artifacts/ --serve-artifacts --host 0.0.0.0 --port 5001"
    restart: unless-stopped

  adminer:
    container_name: immich_adminer
    image: adminer:latest
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - immich_postgres

volumes:
  model-cache:
  minio-data:
  mlflow-postgres-data:
