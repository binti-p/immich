name: Build Aesthetic Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'aesthetic/**'
      - '.github/workflows/build-aesthetic-service.yml'

concurrency:
  group: aesthetic-service-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Aesthetic Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: aesthetic
          file: aesthetic/service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aesthetic-service:main
            ghcr.io/${{ github.repository_owner }}/aesthetic-service:${{ github.sha }}
          cache-from: type=gha
