name: Build and Push Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/immich

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immich-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          build-args: |
            PUBLIC_IMMICH_SERVER_URL=http://129.114.27.253:32081
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich/immich-server:latest
            ghcr.io/${{ github.repository_owner }}/immich/immich-server:${{ github.sha }}

  build-machine-learning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immich-machine-learning
        uses: docker/build-push-action@v5
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich/immich-machine-learning:latest
            ghcr.io/${{ github.repository_owner }}/immich/immich-machine-learning:${{ github.sha }}
