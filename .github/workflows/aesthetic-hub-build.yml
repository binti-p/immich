name: Aesthetic Hub Build

# Simplified workflow for building aesthetic-hub components
# Triggers on push to main and manual workflow dispatch
# Does not run tests - just builds and pushes images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/aesthetic-hub-build.yml'

concurrency:
  group: aesthetic-hub-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-immich-server:
    name: Build Immich Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immich-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich-server:main
            ghcr.io/${{ github.repository_owner }}/immich-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
