name: Aesthetic Hub Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'machine-learning/**'
      - 'scoring-service/**'
      - 'aesthetic/**'
      - '.github/workflows/aesthetic-hub-build.yml'

concurrency:
  group: aesthetic-hub-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-immich-server:
    name: Build Immich Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich-server:main
            ghcr.io/${{ github.repository_owner }}/immich-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-immich-ml:
    name: Build Immich Machine Learning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich-machine-learning:main
            ghcr.io/${{ github.repository_owner }}/immich-machine-learning:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: DEVICE=cpu

  build-aesthetic-service:
    name: Build Aesthetic Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: aesthetic
          file: aesthetic/service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aesthetic-service:main
            ghcr.io/${{ github.repository_owner }}/aesthetic-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
