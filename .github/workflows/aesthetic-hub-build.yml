name: Aesthetic Hub Build

# Simplified workflow for building aesthetic-hub components
# Triggers on push to main and manual workflow dispatch
# Does not run tests - just builds and pushes images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'aesthetic/**'
      - '.github/workflows/aesthetic-hub-build.yml'

concurrency:
  group: aesthetic-hub-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-immich-server:
    name: Build Immich Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immich-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich/immich-server:latest
            ghcr.io/${{ github.repository_owner }}/immich/immich-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-aesthetic-service:
    name: Build Aesthetic Service
    runs-on: ubuntu-latest
    # Only run if aesthetic/ directory exists
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if aesthetic service exists
        id: check
        run: |
          if [ -d "aesthetic/service" ] && [ -f "aesthetic/service/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push aesthetic-service
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: aesthetic/service
          file: aesthetic/service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich/aesthetic-service:latest
            ghcr.io/${{ github.repository_owner }}/immich/aesthetic-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Build Summary
    needs: [build-immich-server, build-aesthetic-service]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### Aesthetic Hub Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Immich Server**: ${{ needs.build-immich-server.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Aesthetic Service**: ${{ needs.build-aesthetic-service.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to: \`ghcr.io/${{ github.repository_owner }}/immich/\`" >> $GITHUB_STEP_SUMMARY
