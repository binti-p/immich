name: Build Immich Machine Learning

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'machine-learning/**'
      - '.github/workflows/build-immich-ml.yml'

concurrency:
  group: immich-ml-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Immich Machine Learning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/immich-machine-learning:main
            ghcr.io/${{ github.repository_owner }}/immich-machine-learning:${{ github.sha }}
          cache-from: type=gha
          build-args: DEVICE=cpu
